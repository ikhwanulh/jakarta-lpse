services:
  lpse-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jakarta-lpse-portal
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/db.json
    volumes:
      # Mount a host directory for persistent data
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
